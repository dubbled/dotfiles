# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# general
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# status
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#000000,fg=#333333"

# left: bracket + session
set -g status-left-length 50
set -g status-left "#[bg=#6b0000,fg=#ff6666][#[bg=#6b0000,fg=#aaaaaa] #S #[bg=#6b0000,fg=#ff6666]]#[bg=#000000,fg=#1e1e1e]>"

# windows
setw -g window-status-format "#[fg=#1a1a1a]>#[fg=#444444]#I#[fg=#1a1a1a]:#[fg=#444444]#W"
setw -g window-status-current-format "#[fg=#660000]>#[fg=#cc3333]#I#[fg=#660000]:#[fg=#cc3333]#W#[fg=#660000]<"
setw -g window-status-separator "  "

# right: host
set -g status-right-length 80
set -g status-right "#[bg=#000000,fg=#1e1e1e]> #[bg=#6b0000,fg=#ff6666][#[bg=#6b0000,fg=#aaaaaa] #H #[bg=#6b0000,fg=#ff6666]]"

# pane borders — heavy active
set -g pane-border-lines heavy
set -g pane-border-style "fg=#1a1a1a"
set -g pane-active-border-style "fg=#6b0000"

# messages
set -g message-style "bg=#0d0000,fg=#cc3333"
set -g message-command-style "bg=#0d0000,fg=#666666"

# clock / copy
setw -g clock-mode-colour "#cc3333"
setw -g mode-style "bg=#3a0000,fg=#cc3333"

# keybinds
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind r source-file ~/.tmux.conf \; display "[ reloaded ]"
bind c new-window -c "#{pane_current_path}"
